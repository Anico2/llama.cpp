services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector-container-lc
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PG_USER_}
      POSTGRES_PASSWORD: ${PG_PASSWORD_}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6025:5432"
    volumes:
      - ./pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $PG_USER_"]
      interval: 5s
      timeout: 5s
      retries: 5
