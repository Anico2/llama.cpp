# PDF directories to load
PDF_DIRS:
  - ./documents/stellantis
  #- ./documents/free
  #- ./documents/purchased

chunk_strategy: toc # recursive #qa # semantic or recursive or qa

# Text splitting
text_splitter:
  chunk_size: 1000
  chunk_overlap: 100
  separators:
    - "\n\n"
    - "\n"
    - " "
    - "."

# PGVector
vectorstore:
  collection_name: documents
  search_kwargs:
    k: 2 # how many documents to retrieve

# LLM defaults
llm:
  model:  Meta-Llama-3.1-8B-Instruct-Q5_K_M
  temperature: 0
  chain_type: stuff
embeddings:
  model: all-MiniLM-L6-v2-ggml-model-f16 #snowflake-arctic-embed-m-v1.5 #nomic-embed-text-v1.5

# Ragas evaluation settings
evaluation:
  test_file_path: test_dataset.csv
  judge_llm:
    model: Meta-Llama-3.1-8B-Instruct-Q5_K_M

# litellm
litellm:
  enabled: False
